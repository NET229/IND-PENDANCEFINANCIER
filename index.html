<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc,
  setDoc, getDoc, getDocs, addDoc,
  updateDoc, deleteDoc,
  query, where, orderBy,
  onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB7_6wGeZKhKG58v7NKJIxDFG4uOGQp6PE",
  authDomain: "independance-financier.firebaseapp.com",
  databaseURL: "https://independance-financier-default-rtdb.firebaseio.com",
  projectId: "independance-financier",
  storageBucket: "independance-financier.firebasestorage.app",
  messagingSenderId: "945509783220",
  appId: "1:945509783220:web:3121fe1d1b04de8f4de9e1",
  measurementId: "G-EQ2HYBBHFQ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window._db = db;
window._fsHelpers = { collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, serverTimestamp };

const ADMINS = [
  "adminindependancefinancier@gmail.com",
  "adminindependancefinancier2@gmail.com",
  "adminindependancefinancier3@gmail.com"
];

window.registerUser = async function(nom, email, tel, password) {
  try {
    const id = Date.now().toString();
    const emailLower = email.toLowerCase();
    const role = ADMINS.includes(emailLower)? "admin" : "user";

    await setDoc(doc(db, "users", id), {
      id: id,
      nom: nom,
      email: email,
      tel: tel,
      password: password,
      solde: 0,
      gains: 0,
      plan: "Aucun",
      role: role,
      emailVerified: false,
      kyc: "non_verifie",
      date_inscription: serverTimestamp(),
      source: "site"
    });
    console.log(" User créé:", id, "Role:", role);
    return { success: true, id: id, role: role };
  } catch(e) {
    console.error(" Erreur inscription:", e);
    return { success: false, error: e.message };
  }
}[Firebase]

window.demanderRetrait = async function(userId, montant, methode, numero) {
  try {
    await addDoc(collection(db, "withdrawals"), {
      userId: userId,
      montant: Number(montant),
      methode: methode,
      numero: numero,
      statut: "pending",
      date_demande: serverTimestamp()
    });
    console.log(" Retrait demandé");
    return { success: true };
  } catch(e) {
    console.error(" Erreur retrait:", e);
    return { success: false, error: e.message };
  }
}[Firebase]

window.investir = async function(userId, planNom, montant) {
  try {
    await addDoc(collection(db, "transactions"), {
      userId: userId,
      type: "investissement",
      plan: planNom,
      montant: Number(montant),
      statut: "actif",
      date: serverTimestamp()
    });
    await updateDoc(doc(db, "users", userId), {
      plan: planNom,
      dernier_invest: serverTimestamp()
    });
    console.log(" Investissement créé");
    return { success: true };
  } catch(e) {
    console.error(" Erreur investissement:", e);
    return { success: false, error: e.message };
  }
}[Firebase]

onSnapshot(collection(db, 'transactions'), snap => {
  const data = [];
  snap.forEach(d => data.push({ id: d.id,...d.data() }));
  localStorage.setItem('IF_transactions', JSON.stringify(data));
  const cu = JSON.parse(sessionStorage.getItem('IF_currentUser') || 'null');
  if (cu?.role === 'admin' && typeof loadAdmin === 'function') loadAdmin();
  else if (cu?.emailVerified && typeof loadDashboard === 'function') loadDashboard();
});

onSnapshot(collection(db, 'users'), snap => {
  const data = [];
  snap.forEach(d => data.push({ id: d.id,...d.data() }));
  localStorage.setItem('IF_users', JSON.stringify(data));
  try {
    const s = sessionStorage.getItem('IF_currentUser');
    if (s) {
      const cu = JSON.parse(s);
      const updated = data.find(u => u.id === cu.id);
      if (updated) sessionStorage.setItem('IF_currentUser', JSON.stringify(updated));
      if (cu.role === 'admin' && typeof loadAdmin === 'function') loadAdmin();
    }
  } catch(e) {}
});

onSnapshot(collection(db, 'withdrawals'), snap => {
  const data = [];
  snap.forEach(d => data.push({ id: d.id,...d.data() }));
  localStorage.setItem('IF_withdrawals', JSON.stringify(data));
  if (typeof loadAdmin === 'function') loadAdmin();
});

window._firebaseReady = true;
document.dispatchEvent(new Event('firebaseReady'));
console.log(' OK Projet independance-financier connecté - Admins:', ADMINS.length);[Firebase]

.timer-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(74,144,217,0.12);border:1px solid rgba(74,144,217,0.3);padding:5px 11px;border-radius:50px;font-size:0.78rem;color:var(--accent)}
.ref-box{background:var(--dark4);border:1px dashed var(--gold-dark);border-radius:9px;padding:12px 14px;display:flex;align-items:center;gap:9px;margin-bottom:14px}
.ref-code{font-family:monospace;font-size:1rem;color:var(--gold);flex:1;word-break:break-all}
.kyc-steps{display:flex;gap:0;margin-bottom:26px}
.kyc-step{flex:1;text-align:center;position:relative}
.kyc-step::after{content:'';position:absolute;top:15px;left:50%;width:100%;height:2px;background:var(--border);z-index:0}
.kyc-step:last-child::after{display:none}
.kyc-step-num{width:30px;height:30px;border-radius:50%;background:var(--dark4);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:600;margin:0 auto 5px;position:relative;z-index:1}
.kyc-step.done .kyc-step-num{background:var(--accent2);border-color:var(--accent2);color:#fff}
.kyc-step.active .kyc-step-num{background:var(--gold);border-color:var(--gold);color:#000}
.kyc-step-label{font-size:0.7rem;color:var(--text-muted)}
.notif-dot{width:8px;height:8px;border-radius:50%;background:#E74C3C;display:inline-block;margin-left:4px;animation:pulse 1.5s infinite}
#admin{display:none}#admin.active{display:flex}
.admin-sidebar{width:240px;min-height:100vh;background:linear-gradient(180deg,var(--dark2),#0d0d18);border-right:1px solid rgba(231,76,60,0.2);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:50;transition:transform 0.3s}
.admin-header-bar{padding:20px 18px;background:rgba(231,76,60,0.08);border-bottom:1px solid rgba(231,76,60,0.2)}
.admin-logo{font-family:'Playfair Display',serif;font-size:1.05rem;color:#E74C3C}
.admin-logo span{display:block;font-size:0.68rem;font-family:'DM Sans',sans-serif;color:var(--text-muted)}
.network-btn{background:var(--dark4);border:2px solid var(--border);border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;transition:all 0.2s}
.network-btn:hover{border-color:var(--gold-dark);transform:translateY(-2px)}
.network-btn.selected{border-color:var(--gold);background:rgba(201,168,76,0.12);box-shadow:0 0 0 1px var(--gold)}
.ussd-pulse{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 16px;animation:ussdPulse 1.5s ease-in-out infinite}
@keyframes ussdPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(201,168,76,0.4)}50%{transform:scale(1.05);box-shadow:0 0 0 16px rgba(201,168,76,0)}}
.hero h1,.hero p,.hero-btns,.hero-badge{animation:fadeUp 0.7s ease both}
.hero h1{animation-delay:0.1s}.hero p{animation-delay:0.2s}.hero-btns{animation-delay:0.3s}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .main-content{margin-left:0}.menu-toggle{display:block}
  .hero{padding:130px 5% 60px}.stats-row{gap:22px}
  .plans-grid{grid-template-columns:1fr 1fr}.modal{padding:22px}
  .page-content{padding:16px}.cards-grid{grid-template-columns:1fr 1fr}
  .admin-sidebar{transform:translateX(-100%)}.admin-sidebar.open{transform:translateX(0)}
  #admin .main-content{margin-left:0}
}
@media(max-width:480px){
  .plans-grid{grid-template-columns:1fr}.cards-grid{grid-template-columns:1fr}
  .nav-btns .btn:first-child{display:none}
}
</style>

// ================================================================
// FILE D'ATTENTE FIREBASE — garantit l'écriture même sur réseau lent
// ================================================================
window._fq = []; // file d'attente
window._fqRunning = false;

async function _runQueue(){
  if(window._fqRunning || !window._fq.length) return;
  if(!window._db){ setTimeout(_runQueue, 1500); return; }
  window._fqRunning = true;
  while(window._fq.length){
    const task = window._fq[0];
    try{
      await task.fn();
      window._fq.shift(); // succès → retirer
    } catch(e){
      console.warn('[Firebase Queue] Retry dans 2s —', task.label, e.message);
      await new Promise(r => setTimeout(r, 2000));
      // Si même erreur après 5 tentatives → abandonner cette tâche
      task.attempts = (task.attempts||0) + 1;
      if(task.attempts >= 5){
        console.error('[Firebase Queue] Abandon après 5 tentatives —', task.label);
        window._fq.shift();
      }
    }
  }
  window._fqRunning = false;
}

function _enqueue(label, fn){
  // Remplacer si même label existe déjà (évite les doublons)
  const i = window._fq.findIndex(t => t.label === label);
  if(i !== -1) window._fq[i] = { label, fn, attempts:0 };
  else         window._fq.push({ label, fn, attempts:0 });
  _runQueue();
}

// Sauvegarder un utilisateur dans Firebase
function fbSaveUser(u){
  if(!u?.id) return;
  // Mettre à jour le cache local immédiatement
  const arr = getUsers();
  const i = arr.findIndex(x => x.id === u.id);
  if(i === -1) arr.push(u); else arr[i] = {...arr[i], ...u};
  saveUsers(arr);
  // Enregistrer dans Firebase via la queue
  _enqueue('user:'+u.id, async () => {
    const {doc, setDoc} = window._fsHelpers;
    await setDoc(doc(window._db, 'users', u.id), u, {merge:true});
  });
}

// Sauvegarder une transaction dans Firebase
function fbSaveTx(tx){
  if(!tx?.id) return;
  // Mettre à jour le cache local immédiatement
  const arr = getTransactions();
  const i = arr.findIndex(t => t.id === tx.id);
  if(i === -1) arr.push(tx); else arr[i] = {...arr[i], ...tx};
  saveTransactions(arr);
  // Enregistrer dans Firebase via la queue
  _enqueue('tx:'+tx.id, async () => {
    const {doc, setDoc} = window._fsHelpers;
    await setDoc(doc(window._db, 'transactions', tx.id), tx, {merge:true});
  });
}

// Sauvegarder les plans dans Firebase
function fbWritePlans(plans){
  _enqueue('plans', async () => {
    const {doc, setDoc} = window._fsHelpers;
    await setDoc(doc(window._db, 'config', 'plans'), {plans}, {merge:true});
  });
}

// ================================================================
// CHARGEMENT INITIAL DEPUIS FIREBASE
// ================================================================
async function fbLoadAll(){
  if(!window._db){
    console.warn('[Firebase] Base de données non disponible');
    return;
  }
  try{
    const {collection, getDocs, doc, getDoc} = window._fsHelpers;

    // Tout charger en parallèle pour aller vite
    const [uSnap, tSnap, pSnap, aSnap] = await Promise.all([
      getDocs(collection(window._db, 'users')),
      getDocs(collection(window._db, 'transactions')),
      getDoc(doc(window._db, 'config', 'plans')),
      getDoc(doc(window._db, 'config', 'announce'))
    ]);

    // ── Utilisateurs ──
    if(!uSnap.empty){
      const fbUsers = [];
      uSnap.forEach(d => fbUsers.push(d.data()));
      // Préserver le code email de vérification en cours
      const local = getUsers();
      fbUsers.forEach(fu => {
        const lu = local.find(u => u.id === fu.id);
        if(lu && !lu.emailVerified && lu.emailVerifyCode) fu.emailVerifyCode = lu.emailVerifyCode;
      });
      saveUsers(fbUsers); // Firebase est la source de vérité
    }

    // ── Transactions ──
    if(!tSnap.empty){
      const fbTxs = [];
      tSnap.forEach(d => fbTxs.push(d.data()));
      saveTransactions(fbTxs); // Firebase est la source de vérité
    }

    // ── Plans ──
    if(pSnap.exists() && pSnap.data()?.plans){
      savePlans(pSnap.data().plans);
    } else {
      // Aucun plan en base → sauvegarder les plans par défaut
      fbWritePlans(DEFAULT_PLANS);
    }

    // ── Annonce ──
    if(aSnap.exists() && aSnap.data()?.text){
      localStorage.setItem('IF_announce', aSnap.data().text);
    }

    console.log('[Firebase] ✅ Chargement OK —',
      uSnap.size, 'utilisateurs,',
      tSnap.size, 'transactions');

  } catch(e){
    console.error('[Firebase] Erreur chargement:', e.message);
  }
}

let moneyRainActive=false, moneyRafId=null;
function startMoneyRain(){
  if(moneyRainActive) return;
  moneyRainActive=true;
  const canvas=document.getElementById('moneyCanvas');
  const ctx=canvas.getContext('2d');
  function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);
  const bills=['💵','💴','💶','💷','💸','🤑','💰','💳'];
  const particles=[];
  const COUNT=window.innerWidth<600?22:42;
  for(let i=0;i<COUNT;i++){
    particles.push({ x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight-window.innerHeight,
      vx:(Math.random()-0.5)*1.2, vy:0.8+Math.random()*1.8,
      rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.06,
      size:18+Math.random()*22, symbol:bills[Math.floor(Math.random()*bills.length)],
      opacity:0.55+Math.random()*0.45, swing:Math.random()*0.04, swingOffset:Math.random()*Math.PI*2 });
  }
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height); frame++;
    particles.forEach(p=>{
      p.x+=p.vx+Math.sin(frame*p.swing+p.swingOffset)*0.6; p.y+=p.vy; p.rot+=p.rotV;
      if(p.y>canvas.height+60){ p.y=-60; p.x=Math.random()*canvas.width; }
      ctx.save(); ctx.globalAlpha=p.opacity; ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.font=`${p.size}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(p.symbol,0,0); ctx.restore();
    });
    moneyRafId=requestAnimationFrame(draw);
  }
  draw();
}
function stopMoneyRain(){
  moneyRainActive=false;
  if(moneyRafId) cancelAnimationFrame(moneyRafId);
  const canvas=document.getElementById('moneyCanvas');
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
}

async function handleLogin(){
  const em=document.getElementById('loginEmail').value.trim().toLowerCase();
  const pw=document.getElementById('loginPassword').value;
  if(!em||!pw) return showAlert('loginAlert','Renseignez email et mot de passe.');

  const btn=document.querySelector('#loginModal .btn-gold');
  if(btn){ btn.innerHTML='<span class="spinner"></span> Connexion...'; btn.disabled=true; }
  const reset=()=>{ if(btn){ btn.innerHTML='Se connecter'; btn.disabled=false; } };

  // Admin hérité
  if(em===ADMIN_EMAIL&&pw===ADMIN_PW){
    setCurrentUser({id:'admin',role:'admin',firstname:'Admin 1',lastname:'IF',email:em,adminIndex:0});
    reset(); closeModal('loginModal'); stopMoneyRain(); loadAdmin(); showPage('admin'); return;
  }

  // Charger Firebase si localStorage vide (premier accès sur cet appareil)
  if(getUsers().length===0){
    await fbLoadAll();
  }

  const users=getUsers();
  const user=users.find(u=>u.email===em&&u.password===pw);
  if(!user){ reset(); return showAlert('loginAlert','Email ou mot de passe incorrect.'); }

  // Promouvoir admin si email reconnu
  if(ADMIN_EMAILS.includes(em)&&user.role!=='admin'){
    const all=getUsers(); const i=all.findIndex(u=>u.id===user.id);
    if(i!==-1){ all[i].role='admin'; all[i].adminIndex=ADMIN_EMAILS.indexOf(em); localStorage.setItem('IF_users',JSON.stringify(all)); fbSaveUser(all[i]); user.role='admin'; user.adminIndex=ADMIN_EMAILS.indexOf(em); }
  }

  setCurrentUser(user); reset(); closeModal('loginModal');
  if(user.role==='admin'){ stopMoneyRain(); loadAdmin(); showPage('admin'); return; }
  if(!user.emailVerified){ openModal('emailVerifyModal'); return; }
  stopMoneyRain(); loadDashboard(); showPage('dashboard');
}

// Bonus parrainage au 1er dépôt approuvé du filleul
function triggerAffiliateBonus(userId){
  const allTxs=getTransactions();
  const deposits=allTxs.filter(t=>t.userId===userId&&t.type==='deposit'&&t.status==='approved');
  if(deposits.length!==1) return; // seulement au tout premier dépôt
  const users=getUsers(); const uidx=users.findIndex(u=>u.id===userId); if(uidx===-1) return;
  const refId=users[uidx].referrerId; if(!refId) return;
  const ridx=users.findIndex(u=>u.id===refId); if(ridx===-1) return;
  users[ridx].balance=(users[ridx].balance||0)+AFFILIATE_BONUS;
  users[ridx].affiliateBonus=(users[ridx].affiliateBonus||0)+AFFILIATE_BONUS;
  users[ridx].referrals=users[ridx].referrals||[];

function computeDailyBonus(u){
  const plans=getPlans();
  if(!u.plans||!u.plans.length) return 0;
  return u.plans.reduce((sum,pid)=>{ const p=plans.find(x=>x.id===pid); return sum+(p?p.daily:0); },0);
}

function dailyBonusCredit(u){
  const today=new Date().toDateString();
  if(u.lastBonusDate===today) return;
  const bonus=computeDailyBonus(u); if(bonus<=0) return;
  const users=getUsers(); const idx=users.findIndex(x=>x.id===u.id); if(idx===-1) return;
  users[idx].balance=(users[idx].balance||0)+bonus;
  users[idx].pendingBonus=(users[idx].pendingBonus||0)+bonus;
  users[idx].lastBonusDate=today;
  saveUsers(users); setCurrentUser(users[idx]);
  addTransaction(u.id,'bonus',bonus,'approved','Bonus quotidien automatique');
  showToast('+'+fmtMoney(bonus)+' FCFA bonus crédité !','success');
}

function updateBonusTimer(){
  const now=new Date(); const midnight=new Date(now); midnight.setHours(24,0,0,0);
  const diff=midnight-now;
  const h=Math.floor(diff/3600000).toString().padStart(2,'0');
  const m=Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
  const s=Math.floor((diff%60000)/1000).toString().padStart(2,'0');
  const el=document.getElementById('timerCount'); if(el) el.textContent=h+':'+m+':'+s;
}

function submitDeposit(){
  const amt=parseInt(document.getElementById('depositAmount').value);
  if(!amt||amt<500) return showAlert('depositAlert','Montant minimum : 500 FCFA.');
  const cu=getCurrentUser(); if(!cu) return;
  const users=getUsers(); const u=users.find(x=>x.id===cu.id)||cu;

  if(typeof LeekPay === 'undefined')
    return showAlert('depositAlert','❌ LeekPay non chargé. Vérifiez votre connexion internet.','error');

  // Mettre à jour le montant sur le vrai bouton LeekPay
  const lpBtn=document.getElementById('leekpayBtn');
  if(!lpBtn) return showAlert('depositAlert','Erreur technique. Rechargez la page.','error');
  lpBtn.setAttribute('data-leekpay-amount', amt);
  lpBtn.setAttribute('data-leekpay-email', u.email||'');

  // Préparer les callbacks AVANT de cliquer
  // La transaction n'est créée QU'AU SUCCÈS du paiement
  window._pendingDepositAmt = amt;

  // Cliquer le vrai bouton LeekPay (déjà reconnu par leekpay.js)
  lpBtn.click();
}

// Callbacks LeekPay — appelés par le widget
window.leekpayOnSuccess = function(data){
  const amt = window._pendingDepositAmt;
  const userId = window._pendingDepositUserId;
  if(!amt||!userId) return;
  const txId=genId();
  const tx={id:txId, userId, type:'deposit', amount:amt, status:'approved',
    note:'LeekPay | Confirmé', leekpayId:data?.payment_id||data?.id||txId, date:Date.now()};
  // localStorage + Firebase
  const txs=getTransactions(); txs.push(tx);
  localStorage.setItem('IF_transactions',JSON.stringify(txs));
  fbSaveTx(tx);
  // Créditer le solde
  const usrs=getUsers(); const uidx=usrs.findIndex(x=>x.id===userId);
  if(uidx!==-1){
    usrs[uidx].balance=(usrs[uidx].balance||0)+amt;
    localStorage.setItem('IF_users',JSON.stringify(usrs));
    fbSaveUser(usrs[uidx]);
    setCurrentUser(usrs[uidx]);
  }
  // ✅ Bonus parrainage au 1er dépôt
  triggerAffiliateBonus(userId);
  window._pendingDepositAmt=null; window._pendingDepositUserId=null;
  document.getElementById('depositAmount').value='';
  showAlert('depositAlert','✅ Dépôt de '+fmtMoney(amt)+' FCFA confirmé ! Solde crédité.','success');
  showToast('💰 Solde crédité de '+fmtMoney(amt)+' FCFA !','success');
  loadDashboard();
};

  document.querySelectorAll('#dashboard .tab-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('#sidebar .nav-item').forEach(i=>i.classList.remove('active'));
  const s=document.getElementById('tab-'+name); if(s) s.classList.add('active');
  document.querySelectorAll('#sidebar .nav-item').forEach(i=>{ if(i.getAttribute('onclick')&&i.getAttribute('onclick').includes("'"+name+"'")) i.classList.add('active'); });
  const t=document.getElementById('topbarTitle'); if(t) t.textContent=tabTitles[name]||name;
  closeSidebar();
  if(name==='withdraw'){
    const cu=getCurrentUser(); const u=getUsers().find(x=>x.id===cu?.id)||cu;
    const el=document.getElementById('withdrawBalance'); if(el) el.textContent=fmtMoney(u?.balance||0)+' FCFA';
  }
}
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('open'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }

function loadAdmin(){

  if(topbarEmail && cu) topbarEmail.textContent=(cu.email||ADMIN_EMAIL)+' (Admin '+(getCurrentAdminIndex()+1)+')';
  const allUsers=getUsers(); // TOUS — admins inclus
  const members=allUsers.filter(u=>u.role!=='admin'); // membres seulement pour les stats

  const deposits=txs.filter(t=>t.type==='deposit');
  const withdrawals=txs.filter(t=>t.type==='withdrawal');
  const pending=withdrawals.filter(t=>t.status==='pending'||t.status==='pending_admin_approval');
  document.getElementById('adminUserCount').textContent=members.length;
  document.getElementById('adminDepTotal').textContent=fmtMoney(deposits.filter(t=>t.status==='approved').reduce((s,t)=>s+t.amount,0));
  document.getElementById('adminWithTotal').textContent=fmtMoney(withdrawals.filter(t=>t.status==='approved').reduce((s,t)=>s+t.amount,0));
  document.getElementById('adminPendingCount').textContent=pending.length;

    <td>${u.firstname} ${u.lastname}</td>

    <td>${fmtMoney(u.balance||0)} FCFA</td>

    <td><span class="badge badge-${u.kyc==='verified'?'success':u.kyc==='submitted'?'pending':'danger'}">${u.kyc==='verified'?'✓ Vérifié':u.kyc==='submitted'?'En attente':'✗'}</span></td>

    <td style="font-size:0.78rem">${u.email}</td>
    <td style="color:var(--gold)">${fmtMoney(u.balance||0)}</td>

    <td>${(u.plans||[]).length||'—'}</td>

    <td><div style="display:flex;gap:5px"><button class="btn btn-sm btn-gold" onclick="adminCreditUser('${u.id}')">+Crédit</button><button class="btn btn-sm btn-danger" onclick="adminDeleteUser('${u.id}')"><i class="fa fa-trash"></i></button></div></td>
  </tr>`).join('');
  const wt=document.getElementById('adminWithdrawalsTbody');
  if(wt) wt.innerHTML=[...withdrawals].reverse().map(t=>{
    const u=allUsers.find(x=>x.id===t.userId)||{}; // allUsers inclut les admins
    const np=(t.note||'').split('|').map(s=>s.trim());
    const wN=np[0]||'—', wNum=np[1]||'—', wNm=np[2]||'—';
    const isAdminW = t.status==='pending_admin_approval' || t.requestedByAdmin!==undefined;
    const currentAdminIdx=getCurrentAdminIndex();
    const requesterIdx = t.requestedByAdmin!==undefined ? t.requestedByAdmin : (u.adminIndex??ADMIN_EMAILS.indexOf(u.email??''));
    const canApproveAdminW = isAdminW && currentAdminIdx !== requesterIdx;
    let statusBadge='';
    if(t.status==='approved') statusBadge='<span class="badge badge-success">✅ Approuvé</span>';
    else if(t.status==='pending'&&!isAdminW) statusBadge='<span class="badge badge-pending">⏳ En attente</span>';
    else if(isAdminW&&t.status!=='approved') statusBadge='<span class="badge" style="background:rgba(74,144,217,0.15);color:var(--accent)">🔐 Approbation admin requise</span>';
    else if(t.status==='processing') statusBadge='<span class="badge badge-pending">⚙️ En cours...</span>';
    else statusBadge='<span class="badge badge-danger">❌ Refusé</span>';
    const userName = isAdminW

  const kt=document.getElementById('adminKycTbody');
  if(kt){

function approveWithdrawal(txId){
  const txs=getTransactions(); const idx=txs.findIndex(t=>t.id===txId); if(idx===-1) return;
  const t=txs[idx]; const myIdx=getCurrentAdminIndex();

  // Retrait admin — nécessite approbation d'un AUTRE admin
  if(t.status==='pending_admin_approval'||t.requestedByAdmin!==undefined){
    const requesterIdx=t.requestedByAdmin!==undefined?t.requestedByAdmin:-1;
    if(myIdx===requesterIdx) return showToast('⛔ Vous ne pouvez pas approuver votre propre retrait.','error');
    const updated={...t,status:'approved',approvedByAdmin:myIdx,approvedAt:Date.now()};
    localStorage.setItem('IF_transactions',JSON.stringify(getTransactions().map(x=>x.id===txId?updated:x)));
    fbSaveTx(updated);
    showToast('✅ Retrait admin de '+fmtMoney(t.amount)+' FCFA approuvé ! Envoyez le paiement manuellement.','success');
    loadAdmin(); return;
  }

  // Retrait membre — déduire le solde et marquer approuvé
  const allUsers=getUsers(); const uidx=allUsers.findIndex(u=>u.id===t.userId);
  if(uidx===-1) return showToast('Utilisateur introuvable.','error');
  if((allUsers[uidx].balance||0)<t.amount) return showToast('Solde insuffisant !','error');
  allUsers[uidx].balance-=t.amount;
  allUsers[uidx].totalWithdrawn=(allUsers[uidx].totalWithdrawn||0)+t.amount;
  const np=(t.note||'').split('|').map(s=>s.trim());
  const updated={...t,status:'approved',approvedAt:Date.now()};
  localStorage.setItem('IF_users',JSON.stringify(allUsers));
  localStorage.setItem('IF_transactions',JSON.stringify(getTransactions().map(x=>x.id===txId?updated:x)));
  fbSaveUser(allUsers[uidx]);
  fbSaveTx(updated);
  showToast('✅ Retrait de '+fmtMoney(t.amount)+' FCFA approuvé ! Envoyez le paiement via '+np[0]+' au '+np[1]+'.','success');
  loadAdmin();
}
function rejectWithdrawal(txId){
  const txs=getTransactions(); const idx=txs.findIndex(t=>t.id===txId); if(idx===-1) return;
  txs[idx].status='rejected'; saveTransactions(txs); fbSaveTx({...txs[idx],status:'rejected'});
  showToast('Retrait refusé.','info'); loadAdmin();
}
function approveDeposit(txId){
  // Approbation manuelle (si LeekPay webhook n'a pas encore crédité)
  const txs=getTransactions(); const idx=txs.findIndex(t=>t.id===txId); if(idx===-1) return;
  const t=txs[idx]; const users=getUsers(); const uidx=users.findIndex(u=>u.id===t.userId);
  if(uidx!==-1){ users[uidx].balance=(users[uidx].balance||0)+t.amount; saveUsers(users); fbSaveUser(users[uidx]); }
  txs[idx].status='approved'; saveTransactions(txs); fbSaveTx({...txs[idx],status:'approved'});
  showToast('Dépôt de '+fmtMoney(t.amount)+' FCFA approuvé manuellement.','success'); loadAdmin();
}
function approveKYC(userId){
  const users=getUsers(); const idx=users.findIndex(u=>u.id===userId); if(idx===-1) return;
  users[idx].kyc='verified'; saveUsers(users); fbSaveUser(users[idx]);
  showToast('KYC approuvé.','success'); loadAdmin();
}
function rejectKYC(userId){
  const users=getUsers(); const idx=users.findIndex(u=>u.id===userId); if(idx===-1) return;
  users[idx].kyc='email_verified'; saveUsers(users); fbSaveUser(users[idx]);
  showToast('KYC refusé.','info'); loadAdmin();
}
function adminCreditUser(userId){
  const amt=parseInt(prompt('Montant à créditer (FCFA):')); if(!amt||amt<=0) return;
  const users=getUsers(); const idx=users.findIndex(u=>u.id===userId); if(idx===-1) return;
  users[idx].balance=(users[idx].balance||0)+amt; saveUsers(users); fbSaveUser(users[idx]);
  addTransaction(userId,'deposit',amt,'approved','Crédit admin');
  showToast(fmtMoney(amt)+' FCFA crédité.','success'); loadAdmin();
}
function adminDeleteUser(userId){
  if(!confirm('Supprimer cet utilisateur ? Action irréversible.')) return;
  const users=getUsers().filter(u=>u.id!==userId);
  saveUsers(users);
  fbDeleteUser(userId);
  showToast('Utilisateur supprimé.','info'); loadAdmin();
}

function renderAdminPlansTable(){
  const plans=getPlans();
  const tbody=document.getElementById('adminPlansTbody'); if(!tbody) return;
  tbody.innerHTML=plans.map(p=>`<tr>
    <td>${p.icon||''} ${p.name}</td>
    <td style="color:var(--gold)">${fmtMoney(p.price)} FCFA</td>
    <td style="color:var(--accent2)">+${fmtMoney(p.daily)} FCFA/j</td>
    <td style="font-size:0.78rem;color:var(--text-muted)">${p.desc||'—'}</td>
    <td><div style="display:flex;gap:5px">
      <button class="btn btn-sm btn-outline" onclick="editPlan('${p.id}')"><i class="fa fa-edit"></i></button>
      <button class="btn btn-sm btn-danger" onclick="deletePlan('${p.id}')"><i class="fa fa-trash"></i></button>
    </div></td>
  </tr>`).join('');
}
function loadPlanSelectOptions(){
  const sel=document.getElementById('editPlanSelect'); if(!sel) return;
  const plans=getPlans(); const cur=sel.value;
  sel.innerHTML='<option value="">— Nouvelle parcelle —</option>'+plans.map(p=>`<option value="${p.id}">${p.icon||''} ${p.name}</option>`).join('');
  sel.value=cur;
}
function loadPlanForEdit(){
  const id=document.getElementById('editPlanSelect').value;
  if(!id){ resetPlanForm(); return; }
  const p=getPlans().find(x=>x.id===id); if(!p) return;
  document.getElementById('planFormName').value=p.name;
  document.getElementById('planFormPrice').value=p.price;
  document.getElementById('planFormDaily').value=p.daily;
  document.getElementById('planFormIcon').value=p.icon||'';
  document.getElementById('planFormDesc').value=p.desc||'';
  document.getElementById('deletePlanBtn').style.display='inline-flex';
}
function resetPlanForm(){
  document.getElementById('editPlanSelect').value='';
  document.getElementById('planFormName').value='';
  document.getElementById('planFormPrice').value='';
  document.getElementById('planFormDaily').value='';
  document.getElementById('planFormIcon').value='';
  document.getElementById('planFormDesc').value='';
  document.getElementById('deletePlanBtn').style.display='none';
}
function savePlanForm(){
  const name=document.getElementById('planFormName').value.trim();
  const price=parseInt(document.getElementById('planFormPrice').value);
  const daily=parseInt(document.getElementById('planFormDaily').value);
  const icon=document.getElementById('planFormIcon').value.trim();
  const desc=document.getElementById('planFormDesc').value.trim();
  if(!name) return showAlert('planFormAlert','Le nom est requis.');
  if(!price||price<=0) return showAlert('planFormAlert','Prix invalide.');
  if(!daily||daily<=0) return showAlert('planFormAlert','Bonus quotidien invalide.');
  const plans=getPlans();
  const editId=document.getElementById('editPlanSelect').value;
  if(editId){
    const idx=plans.findIndex(p=>p.id===editId);
    if(idx!==-1) plans[idx]={...plans[idx],name,price,daily,icon,desc};
    showToast('Parcelle modifiée !','success');
  } else {
    const newId=name.toLowerCase().replace(/\s+/g,'_')+'_'+genId().substr(0,4);
    plans.push({id:newId,name,price,daily,icon,desc});
    showToast('Nouvelle parcelle ajoutée !','success');
  }
  savePlans(plans); fbSavePlans(plans);
  renderAdminPlansTable(); loadPlanSelectOptions(); renderLandingPlans(); resetPlanForm();
}
function editPlan(id){
  const sel=document.getElementById('editPlanSelect'); if(sel){ sel.value=id; loadPlanForEdit(); }
  switchAdminTab('adminPlans',null);
}
function deletePlan(id){
  if(!confirm('Supprimer cette parcelle ?')) return;
  const plans=getPlans().filter(p=>p.id!==id); savePlans(plans); fbSavePlans(plans);
  renderAdminPlansTable(); loadPlanSelectOptions(); renderLandingPlans(); resetPlanForm();
  showToast('Parcelle supprimée.','info');
}
function deletePlanFromForm(){
  const id=document.getElementById('editPlanSelect').value; if(!id) return;
  deletePlan(id);
}

// Configurer les callbacks LeekPay dès que le script est prêt
window.addEventListener('load', function(){
  if(typeof LeekPay !== 'undefined' && LeekPay.configure){
    LeekPay.configure({
      onSuccess: function(data){ if(window.leekpayOnSuccess) window.leekpayOnSuccess(data); },
      onCancel:  function(){     if(window.leekpayOnCancel)  window.leekpayOnCancel(); }
    });
  }
});
(function init(){
  if(!localStorage.getItem('IF_plans')) savePlans(DEFAULT_PLANS);

  // Lien de parrainage depuis URL
  const urlParams=new URLSearchParams(window.location.search);
  const refParam=urlParams.get('ref');
  if(refParam){ const ri=document.getElementById('regReferral'); if(ri) ri.value=refParam; }

  renderLandingPlans();
  loadAnnounce();

  // ── Fonction principale de sync Firebase ──
  const doFbSync=()=>{
    fbLoadAll().then(()=>{
      renderLandingPlans();
      loadAnnounce();

      const cu=getCurrentUser();
      if(cu){
        if(cu.role==='admin'){
          stopMoneyRain();
          showPage('admin');
          loadAdmin();
        } else if(cu.emailVerified){
          stopMoneyRain();
          showPage('dashboard');
          loadDashboard();
        } else {
          startMoneyRain();
          openModal('emailVerifyModal');
        }
      } else {
        startMoneyRain();
      }

      // ── onSnapshot : temps réel entre tous les admins ──
      if(window._fsHelpers && window._db){
        const {onSnapshot,collection}=window._fsHelpers;

        onSnapshot(collection(window._db,'transactions'), snap=>{
          // Firebase → localStorage UNIQUEMENT (pas saveTransactions pour éviter boucle)
          const fbTxs=[]; snap.forEach(d=>fbTxs.push(d.data()));
          const local=getTransactions(); const merged=[...local];
          fbTxs.forEach(ft=>{
            const i=merged.findIndex(t=>t.id===ft.id);
            if(i===-1) merged.push(ft); else merged[i]={...merged[i],...ft};
          });
          localStorage.setItem('IF_transactions',JSON.stringify(merged));
          const cu2=getCurrentUser();
          if(cu2&&cu2.role==='admin') loadAdmin();
          else if(cu2&&cu2.emailVerified) loadDashboard();
        }, err=>console.warn('[RT] transactions:',err.message));

        onSnapshot(collection(window._db,'users'), snap=>{
          // Firebase → localStorage UNIQUEMENT (pas saveUsers pour éviter boucle)
          const fbUsers=[]; snap.forEach(d=>fbUsers.push(d.data()));
          const local=getUsers(); const merged=[...local];
          fbUsers.forEach(fu=>{
            const i=merged.findIndex(u=>u.id===fu.id);
            if(i===-1) merged.push(fu);
            else {
              const lu=merged[i];
              if(!lu.emailVerified&&lu.emailVerifyCode) return;
              merged[i]={...fu,emailVerifyCode:lu.emailVerifyCode||fu.emailVerifyCode};
            }
          });
          localStorage.setItem('IF_users',JSON.stringify(merged));
          const cu2=getCurrentUser();
          if(cu2){
            const updated=merged.find(u=>u.id===cu2.id);
            if(updated) setCurrentUser(updated);
            if(cu2.role==='admin') loadAdmin();
          }
        }, err=>console.warn('[RT] users:',err.message));

        console.log('[FB] ✅ Temps réel actif');
      }
    }).catch(e=>console.warn('[init] fbLoadAll:',e));
  };

  // Démarrer la sync dès que Firebase est prêt
  if(window._firebaseReady) doFbSync();
  else {
    document.addEventListener('firebaseReady', doFbSync, {once:true});
    // Fallback : si l'événement est déjà passé
    setTimeout(()=>{ if(!getUsers().length && window._db) doFbSync(); }, 3000);
  }
})();
</script>

<script>
(function(){
  // Modifiez ces valeurs selon votre réalité
  const STATS = [
    { id:'landingTotalPaid',    target: 12500000, suffix:' FCFA', label:'Distribués' },
    { id:'landingMemberCount',  target: 3842,     suffix:'',      label:'Membres actifs' },
    { id:'landingSuccessRate',  target: 98,       suffix:'%',     label:'Satisfaction' },
    { id:'landingWithdrawals',  target: 1247,     suffix:'',      label:'Retraits effectués' },
  ];

  function animateCounter(el, target, suffix, duration=2000){
    let start = 0;
    const step = target / (duration / 16);
    const timer = setInterval(()=>{
      start += step;
      if(start >= target){
        start = target;
        clearInterval(timer);
      }
      el.textContent = Math.floor(start).toLocaleString('fr-FR') + suffix;
    }, 16);
  }

  function injectStatsSection(){
    // Chercher la section hero existante
    const hero = document.querySelector('.hero') || document.querySelector('#page-home');
    if(!hero) return;

    // Créer la bande de stats si elle n'existe pas
    if(document.getElementById('animatedStatsBar')) return;

    const bar = document.createElement('div');
    bar.id = 'animatedStatsBar';
    bar.style.cssText = `
      background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(201,168,76,0.05));
      border-top: 1px solid rgba(201,168,76,0.25);
      border-bottom: 1px solid rgba(201,168,76,0.25);
      padding: 28px 20px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 40px;
    `;

    STATS.forEach(s => {
      const item = document.createElement('div');
      item.style.cssText = 'text-align:center;min-width:140px;';
      item.innerHTML = `
        <div id="${s.id}" style="font-size:2rem;font-weight:800;color:#C9A84C;font-family:'Playfair Display',serif;">0</div>
        <div style="font-size:0.8rem;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.08em;margin-top:4px;">${s.label}</div>
      `;
      bar.appendChild(item);
    });

    // Insérer après le hero
    hero.insertAdjacentElement('afterend', bar);
  }

  function startCounters(){
    STATS.forEach(s => {
      const el = document.getElementById(s.id);
      if(el) animateCounter(el, s.target, s.suffix);
    });
  }

  // Observer pour déclencher quand visible
  function initObserver(){
    const bar = document.getElementById('animatedStatsBar');
    if(!bar) return;
    const obs = new IntersectionObserver(entries => {
      if(entries[0].isIntersecting){
        startCounters();
        obs.disconnect();
      }
    }, { threshold: 0.3 });
    obs.observe(bar);
  }

  // Attendre que la page soit chargée
  window.addEventListener('load', ()=>{
    injectStatsSection();
    setTimeout(initObserver, 300);
  });

  // Relancer si on revient sur la home
  const origShowPage = window.showPage;
  if(origShowPage){
    window.showPage = function(page){
      origShowPage(page);
      if(page === 'home'){
        setTimeout(()=>{
          injectStatsSection();
          startCounters();
        }, 200);
      }
    };
  }
})();
</script>

<script>
let gainChartInstance = null;

function buildGainChartData(userId){
  const txs = getTransactions().filter(t =>
    t.userId === userId &&
    t.status === 'approved' &&
    (t.type === 'deposit' || t.type === 'bonus' || t.type === 'affiliate')
  );

  // Grouper par semaine (7 dernières semaines)
  const weeks = [];
  const labels = [];
  const now = Date.now();

  for(let i = 6; i >= 0; i--){
    const weekStart = now - (i+1)*7*24*3600*1000;
    const weekEnd   = now - i*7*24*3600*1000;
    const total = txs
      .filter(t => t.date >= weekStart && t.date < weekEnd)
      .reduce((sum, t) => sum + (t.amount||0), 0);
    weeks.push(total);
    const d = new Date(weekEnd);
    labels.push(d.getDate()+'/'+(d.getMonth()+1));
  }
  return { labels, data: weeks };
}

function renderGainChart(u){
  const container = document.getElementById('gainChartSection');
  if(!container) return;

  const { labels, data } = buildGainChartData(u.id);
  const hasData = data.some(v => v > 0);

  container.innerHTML = `
    <div class="panel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div style="font-weight:700;color:#C9A84C;font-size:0.95rem;">📈 Évolution de mes gains</div>
        <div style="font-size:0.72rem;color:rgba(255,255,255,0.4);">7 dernières semaines</div>
      </div>
      ${!hasData
        ? `<div style="text-align:center;padding:30px 0;color:rgba(255,255,255,0.3);font-size:0.85rem;">
             📊 Pas encore de données.<br>Effectuez votre premier dépôt !
           </div>`
        : `<canvas id="gainChartCanvas"></canvas>`
      }
    </div>
  `;

  if(!hasData) return;

  const ctx = document.getElementById('gainChartCanvas').getContext('2d');
  if(gainChartInstance) gainChartInstance.destroy();

  gainChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Gains (FCFA)',
        data,
        borderColor: '#C9A84C',
        backgroundColor: 'rgba(201,168,76,0.12)',
        borderWidth: 2.5,
        pointBackgroundColor: '#C9A84C',
        pointBorderColor: '#1a1a2e',
        pointBorderWidth: 2,
        pointRadius: 5,
        pointHoverRadius: 7,
        tension: 0.4,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(26,26,46,0.95)',
          borderColor: 'rgba(201,168,76,0.4)',
          borderWidth: 1,
          titleColor: '#C9A84C',
          bodyColor: '#fff',
          callbacks: {
            label: ctx => ' ' + fmtMoney(ctx.parsed.y) + ' FCFA'
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: 'rgba(255,255,255,0.45)', font:{ size:11 } }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: {
            color: 'rgba(255,255,255,0.45)',
            font:{ size:11 },
            callback: v => fmtMoney(v)
          },
          beginAtZero: true
        }
      }
    }
  });
}

function injectGainChartSection(){

  if(!statsTab) return;

<script>
(function(){
  const toggle   = document.getElementById('johnChatToggle');
  const window_  = document.getElementById('johnChatWindow');
  const closeBtn = document.getElementById('johnChatClose');
  const messages = document.getElementById('johnChatMessages');
  const input    = document.getElementById('johnChatInput');
  const sendBtn  = document.getElementById('johnChatSend');

  let isOpen    = false;
  let isWaiting = false;
  let history   = []; // historique de conversation

  // ── Ouvrir / Fermer ──
  toggle.addEventListener('click', () => {
    isOpen = !isOpen;
    window_.classList.toggle('open', isOpen);
    toggle.textContent = isOpen ? '✕' : '🤖';
    if(isOpen && messages.children.length === 0) addBotMessage(
      "Bonjour ! 👋 Je suis John, votre assistant. Comment puis-je vous aider ?"
    );
  });
  closeBtn.addEventListener('click', () => {
    isOpen = false;
    window_.classList.remove('open');
    toggle.textContent = '🤖';
  });

  // ── Ajouter message bot ──
  function addBotMessage(text){
    const div = document.createElement('div');
    div.className = 'john-msg bot';
    div.textContent = text;
    messages.appendChild(div);
    scrollBottom();
  }

  // ── Ajouter message utilisateur ──
  function addUserMessage(text){
    const div = document.createElement('div');
    div.className = 'john-msg user';
    div.textContent = text;
    messages.appendChild(div);
    scrollBottom();
  }

  // ── Indicateur "en train d'écrire" ──
  function showTyping(){
    const div = document.createElement('div');
    div.className = 'john-typing';
    div.id = 'johnTyping';
    div.innerHTML = '<span></span><span></span><span></span>';
    messages.appendChild(div);
    scrollBottom();
    return div;
  }
  function hideTyping(){
    const el = document.getElementById('johnTyping');
    if(el) el.remove();
  }

  // ── Scroll bas ──
  function scrollBottom(){
    messages.scrollTop = messages.scrollHeight;
  }

  // ── Envoyer message ──
  async function sendMessage(){
    const text = input.value.trim();
    if(!text || isWaiting) return;

    addUserMessage(text);
    history.push({ role: 'user', content: text });
    input.value = '';
    autoResize();
    isWaiting = true;
    sendBtn.disabled = true;

    const typing = showTyping();

    try {
      // Appel à puter.ai avec historique complet
      const response = await puter.ai.chat(
        history,
        {
          model: 'claude-sonnet-4-5',
          system: `Tu es John, un assistant IA intelligent, sympathique et professionnel pour ce site. 
Tu réponds toujours en français sauf si l'utilisateur écrit dans une autre langue.
Tu es utile, concis et bienveillant. Évite les réponses trop longues.`
        }
      );

      hideTyping();

      const reply = response?.message?.content?.[0]?.text
                 || response?.content?.[0]?.text
                 || response?.text
                 || response
                 || "Je n'ai pas pu répondre. Réessayez.";

      history.push({ role: 'assistant', content: reply });
      addBotMessage(reply);

    } catch(err) {
      hideTyping();
      console.error('[John CHAT]', err);
      addBotMessage("❌ Erreur de connexion. Vérifiez votre connexion internet et réessayez.");
      history.pop(); // retirer le dernier message user si erreur
    }

    isWaiting = false;
    sendBtn.disabled = false;
    input.focus();
  }

  // ── Événements ──
  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Auto-resize textarea ──
  function autoResize(){
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  }
  input.addEventListener('input', autoResize);

})();
</script>
<!-- ========== FIN JOHN CHAT ========== -->

<script>
const _origLoadAdmin_fix = window.loadAdmin;
window.loadAdmin = function(){
  if(_origLoadAdmin_fix) _origLoadAdmin_fix();

  // Re-rendre le tableau des retraits avec TOUS les utilisateurs (admins inclus)
  setTimeout(()=>{
    const allUsers = getUsers(); // Sans filtre — inclut les admins
    const txs = getTransactions();
    const withdrawals = txs.filter(t => t.type === 'withdrawal');
    const cu = getCurrentUser();
    const currentAdminIdx = getCurrentAdminIndex();

    const wt = document.getElementById('adminWithdrawalsTbody');
    if(!wt) return;

    wt.innerHTML = [...withdrawals].reverse().map(t => {
      // Chercher dans TOUS les users (admins inclus)
      const u = allUsers.find(x => x.id === t.userId) || {};
      const np = (t.note||'').split('|').map(s=>s.trim());
      const wN=np[0]||'—', wNum=np[1]||'—', wNm=np[2]||'—';

      const isAdminW = t.status==='pending_admin_approval' ||
                       (u.role==='admin' && t.status==='pending');
      const canApprove = isAdminW && currentAdminIdx !== t.requestedByAdmin &&
                         currentAdminIdx !== allUsers.findIndex(x=>x.id===t.userId);

      let statusBadge = '';
      if(t.status==='approved')
        statusBadge='<span class="badge badge-success">✅ Approuvé</span>';
      else if(t.status==='pending' && !isAdminW)
        statusBadge='<span class="badge badge-pending">⏳ En attente</span>';
      else if(isAdminW && t.status!=='approved')
        statusBadge='<span class="badge" style="background:rgba(74,144,217,0.15);color:var(--accent)">🔐 Approbation admin requise</span>';
      else if(t.status==='processing')
        statusBadge='<span class="badge badge-pending">⚙️ En cours...</span>';
      else if(t.status==='leekpay_failed')
        statusBadge='<span class="badge badge-danger">⚠️ Échec paiement</span>';
      else
        statusBadge='<span class="badge badge-danger">❌ Refusé</span>';

      // Nom affiché — admin ou membre
      const isAdminUser = u.role==='admin' || t.requestedByAdmin !== undefined;
      const adminLabel  = t.requestedByAdmin !== undefined
        ? 'Admin '+(t.requestedByAdmin+1)
        : (u.role==='admin' ? 'Admin' : null);
      const userName = adminLabel
        ? `<strong style="color:var(--accent)">👑 ${adminLabel}</strong><br><span style="font-size:0.74rem;color:var(--text-muted)">${t.requestedByEmail||u.email||''}</span>`
        : `<strong>${u.firstname||'?'} ${u.lastname||''}</strong><br><span style="font-size:0.74rem;color:var(--text-muted)">${u.email||''}</span>`;

      let actions = '—';
      if(t.status==='pending' && !isAdminW)
        actions=`<div style="display:flex;gap:5px;flex-wrap:wrap">
          <button class="btn btn-sm btn-green" onclick="approveWithdrawal('${t.id}')">✓ Approuver</button>
          <button class="btn btn-sm btn-danger" onclick="rejectWithdrawal('${t.id}')">✗ Refuser</button>
        </div>`;
      else if(isAdminW && (t.status==='pending'||t.status==='pending_admin_approval'))
        actions = canApprove
          ? `<div style="display:flex;gap:5px;flex-wrap:wrap">
               <button class="btn btn-sm btn-green" onclick="approveWithdrawal('${t.id}')">✓ Approuver</button>
               <button class="btn btn-sm btn-danger" onclick="rejectWithdrawal('${t.id}')">✗ Refuser</button>
             </div>`
          : '<span style="font-size:0.78rem;color:var(--text-muted)">⛔ Vous êtes le demandeur</span>';
      else if(t.status==='leekpay_failed')
        actions=`<button class="btn btn-sm btn-gold" onclick="approveWithdrawal('${t.id}')">🔄 Réessayer</button>`;

      return `<tr>
        <td>${userName}</td>
        <td style="color:var(--gold);font-weight:600">${fmtMoney(t.amount)} FCFA</td>
        <td style="font-size:0.8rem">
          <span style="color:var(--accent2)">${wN}</span><br>
          <span style="font-family:monospace">${wNum}</span><br>
          <span style="color:var(--text-muted);font-size:0.74rem">${wNm}</span>
        </td>
        <td style="font-size:0.76rem">${fmtDate(t.date)}</td>
        <td>${statusBadge}</td>
        <td>${actions}</td>
      </tr>`;
    }).join('');
  }, 200);
};
</script>
